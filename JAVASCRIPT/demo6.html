<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f4f4f4;
      }
      .calc-container {
        background: white;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      input {
        width: 80%;
        padding: 10px;
        border-radius: 20px;
        margin-bottom: 10px;
        font-size: 1.2rem;
        text-align: right;
      }
      .buttons {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      button {
        padding: 15px;
        font-size: 1rem;
        cursor: pointer;
        border: none;
        background-color: #007bff;
        color: white;
        border-radius: 20px;
      }
      button:hover {
        background-color: #0056b3;
      }
      #result-btn {
        grid-column: span 2;
        background-color: #28a745;
      }
      h2 {
        margin-top: 15px;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="calc-container">
      <input type="number" id="num1" placeholder="First Number" />
      <input type="number" id="num2" placeholder="Second Number" />

      <div class="buttons">
        <button onclick="calculate('+')">+</button>
        <button onclick="calculate('-')">-</button>
        <button onclick="calculate('*')">×</button>
        <button onclick="calculate('/')">÷</button>
      </div>

      <h2 id="display">Result: 0</h2>
    </div>

    <script src="calculator.js"></script>
  </body>
</html>
